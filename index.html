<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mariam 241</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --green: #25D366;
      --green-glow: rgba(37,211,102,0.35);
      --text: #f5f5f5;
      --muted: #555;
      --surface: #141414;
      --border: rgba(255,255,255,0.06);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 32px;
      overflow-x: hidden;
    }

    /* ─── TikTok state ─── */
    #step-tiktok {
      display: none;
      flex-direction: column;
      align-items: center;
      width: min(400px, 100%);
    }
    #step-tiktok.active { display: flex; }

    /* ── Big arrow area at the top, pointing to browser chrome ── */
    .arrow-zone {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding-right: 12px;
      padding-top: 10px;
      margin-bottom: 0;
      height: 110px;
      position: relative;
    }

    /* SVG arrow: starts inside page, curves up-right toward the ··· */
    .arrow-zone svg {
      width: 180px;
      height: 110px;
      overflow: visible;
    }

    .arrow-path {
      stroke: var(--green);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      animation: dashDraw 1s linear infinite;
      stroke-dasharray: 8 5;
    }

    @keyframes dashDraw {
      to { stroke-dashoffset: -52; }
    }

    .arrowhead {
      fill: var(--green);
      animation: arrowBounce 0.8s ease-in-out infinite;
      transform-origin: 160px 10px;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(4px, -4px); }
    }

    /* Label next to arrow */
    .arrow-label {
      position: absolute;
      top: 18px;
      right: 56px;
      background: var(--green);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.78rem;
      padding: 5px 10px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.02em;
      animation: labelPop 0.8s ease-in-out infinite;
    }

    @keyframes labelPop {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.06); }
    }

    /* ── Card ── */
    .instruction-card {
      background: var(--surface);
      border: 1px solid rgba(37,211,102,0.15);
      border-radius: 22px;
      padding: 28px 22px 24px;
      text-align: center;
      width: 100%;
    }

    .instruction-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.15;
    }

    .instruction-sub {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .steps-visual {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .vstep {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
    }

    .vstep:first-child {
      border-color: rgba(37,211,102,0.35);
      background: rgba(37,211,102,0.06);
    }

    .vstep-num {
      width: 28px;
      height: 28px;
      background: var(--green);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .vstep:not(:first-child) .vstep-num {
      background: #252525;
      color: var(--muted);
    }

    .vstep-text {
      font-size: 0.88rem;
      line-height: 1.4;
      color: #ccc;
      flex: 1;
    }

    .vstep-text strong { color: var(--text); font-weight: 400; }

    .vstep-emoji { font-size: 1.25rem; flex-shrink: 0; }

    .footer-note {
      margin-top: 14px;
      font-size: 0.68rem;
      color: #252525;
      text-align: center;
    }

    /* ─── Normal state ─── */
    #step-normal {
      display: none;
      flex-direction: column;
      align-items: center;
      width: min(400px, 100%);
      margin-top: 40vh;
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    #step-normal.active { display: flex; }

    .brand { text-align: center; margin-bottom: 32px; }

    .brand-avatar {
      width: 80px; height: 80px;
      background: #1a2a1e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      border: 1px solid rgba(37,211,102,0.2);
    }

    .brand-name { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
    .brand-sub  { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 20px;
      background: var(--green); color: #000;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
      border-radius: 16px; text-decoration: none;
      animation: btnPulse 2s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 24px var(--green-glow); }
      50%       { box-shadow: 0 0 48px var(--green-glow); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── TikTok state ── -->
<div id="step-tiktok">

  <!-- Arrow zone pointing UP toward browser bar -->
  <div class="arrow-zone">
    <div class="arrow-label">Appuie ici !</div>
    <svg viewBox="0 0 180 110" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <!-- curve from bottom-left of svg up to top-right corner (where ··· lives) -->
      <path class="arrow-path" d="M 30 105 C 40 60, 100 40, 162 8"/>
      <!-- arrowhead at top-right -->
      <polygon class="arrowhead" points="162,2 150,14 170,16"/>
    </svg>
  </div>

  <div class="instruction-card">
    <div class="instruction-title">Appuie sur ···<br>en haut à droite</div>
    <div class="instruction-sub">Le navigateur TikTok bloque WhatsApp.<br>Deux secondes et tu y es :</div>

    <div class="steps-visual">
      <div class="vstep">
        <div class="vstep-num">1</div>
        <div class="vstep-text">Appuie sur <strong>···</strong> en haut à droite</div>
        <div class="vstep-emoji">👆</div>
      </div>
      <div class="vstep">
        <div class="vstep-num">2</div>
        <div class="vstep-text">Choisis <strong>"Ouvrir dans le navigateur"</strong></div>
        <div class="vstep-emoji">🌐</div>
      </div>
    </div>
  </div>

  <div class="footer-note">@mariamai241 · mariam241.com</div>
</div>

<!-- ── Normal state ── -->
<div id="step-normal">
  <div class="brand">
    <div class="brand-avatar">🎓</div>
    <div class="brand-name">Mariam 241</div>
    <div class="brand-sub">Première assistante IA gabonaise</div>
  </div>
  <a class="btn-wa" href="https://wa.me/24174756768?text=Bonjour%20Mariam%20!">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.76-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.533 5.857L0 24l6.335-1.533A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.004-1.368l-.36-.213-3.754.984.999-3.659-.234-.376A9.818 9.818 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
    </svg>
    Contacter sur WhatsApp
  </a>
</div>

<script>
  const WA_URL = "https://wa.me/24174756768?text=Bonjour%20Mariam%20je%20viens%20de%20Tiktok%20!";

  function isTikTokBrowser() {
    return /musical_ly|TikTok|BytedanceWebview|ByteLocale/i.test(navigator.userAgent || '');
  }

  if (isTikTokBrowser()) {
    document.getElementById('step-tiktok').classList.add('active');
  } else {
    document.getElementById('step-normal').classList.add('active');
    setTimeout(() => { window.location.href = WA_URL; }, 1500);
  }
</script>
</body>
</html>
