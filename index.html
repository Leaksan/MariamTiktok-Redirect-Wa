<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mariam 241 — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --green: #25D366;
      --green-dim: rgba(37,211,102,0.12);
      --green-glow: rgba(37,211,102,0.35);
      --text: #f0f0f0;
      --muted: #888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(37,211,102,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a25, #0d0d0d);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      overflow: hidden;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: linear-gradient(135deg, var(--green), transparent 60%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 22px;
      height: 22px;
      background: var(--green);
      border-radius: 50%;
      border: 2px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge svg { width: 11px; height: 11px; fill: #fff; }

    /* Text */
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* CTA button */
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 24px;
      background: var(--green);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.01em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 4px 24px var(--green-glow);
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--green-glow);
    }

    .btn-wa:active {
      transform: translateY(0);
    }

    .btn-wa svg { flex-shrink: 0; }

    /* Divider + note */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      animation: fadeUp 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .note {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .note strong {
      color: var(--green);
      font-weight: 400;
    }

    /* Redirect status */
    .status {
      margin-top: 28px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em;
      animation: fadeUp 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    #countdown { color: rgba(255,255,255,0.35); }
  </style>
</head>

<script>
  const WA_URL = "https://wa.me/24174756768?text=Bonjour%20Mariam%20!";

  // Countdown + auto-redirect
  let n = 3;
  const el = document.getElementById('countdown');
  const timer = setInterval(() => {
    n--;
    el.textContent = n;
    if (n <= 0) {
      clearInterval(timer);
      window.location.href = WA_URL;
    }
  }, 1000);
</script>
